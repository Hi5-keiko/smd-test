<!doctype html>
<html lang="en" class="notranslate">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="img/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script src="js/common.js" defer></script>
<title>島田武典司法書士事務所</title>
</head>

<body>
<!-- Header --> 
  <header>
    <div class="header__box">
      <div class="header__logo"><a href="index.html"><img src="images/logo.svg" alt="島田武典司法書士事務所"></a></div>
      <nav class="header__nav">
        <a href="index.html#about">ごあいさつ</a>
        <a href="index.html#service">業務サービス</a>
        <a href="index.html#information">事業所案内</a>
      </nav>
      <div class="top-header__square-btn">
        営業時間　定休日<br>土曜日・日曜日・祝日
      </div>
    </div>
    <div class="hamburger-menu">
      <input type="checkbox" id="menu-btn-check">
      <label for="menu-btn-check" class="menu-btn"><span></span></label>
      <!-- ここからメニュー -->
      <div class="menu-content">
        <ul>
          <li><a href="index.html#about">ごあいさつ</a></li>
          <li><a href="index.html#service">業務サービス</a></li>
          <li><a href="index.html#information">事業所案内</a></li>
        </ul>
      </div>
    </div>
  </header>
<!-- メイン -->  
  <main class="wrapper">
<!-- ファーストビュー -->      
    <div class="contact__base-box">
      <h2>お問い合わせ</h2>
      <form>
        <div class="form-box">
          <label class="label-name">お名前<span class="label-required"></span></label>
          <input type="text" placeholder="例）山田　太郎" />
        </div>
        <div class="form-box">
          <label class="label-name">住所</label>
          <input type="text" placeholder="例）〒861-0133 熊本市北区植木町滴水153-3 ライフステージ3" />
        </div>            
        <div class="form-box">
          <label class="label-name">電話番号<span class="label-required"></span><br class="sp-only"><span class="label-supplement">※携帯電話でも可能です</span></label>
          <input type="text" placeholder="例）096-277-1670" />
        </div>
        <div class="form-box">
          <label class="label-name">メールアドレス<span class="label-required"></span></label>
          <input type="text" placeholder="例）example@test.com" />
        </div>
        <div class="form-box">
          <label class="label-name">お問い合わせ種別<span class="label-required"></span></label><br>
          <label><input type="radio" />相続・遺言手続き</label><br>            
          <label><input type="radio" />不動産登記</label><br>             
          <label><input type="radio" />商業・法人登記</label><br>     
          <label><input type="radio" />青年後見人</label><br>            
          <label><input type="radio" />その他</label> 
          <input type="text" />              
        </div>
        <div class="form-box">
          <label class="label-name">お問い合わせ内容の詳細</label>
          <textarea></textarea>
        </div>
        <div class="form-box">
          <label><input type="checkbox"><a href="privacypolicy.html" target="_blank">プライバシーポリシー</a>に<br class="sp-only">同意する</label>
        </div>
      </form>
      <div class="cta-button02">
        <a href="#contact"><button class="cmb__n">上記内容で送信する</button></a>
      </div>      
    </div>
  </main>
<!-- footer -->
  <footer>
    <copyright>© 島田武典司法書士事務所</copyright>
  </footer>
  <div id="pagetop"><a href="#"><div class="pagetop__arrow"></div></a></div>
  <div class="side-menu">
    <a href="contact.html">お問い合わせ</a>
  </div>
<!-- 下部固定メニュー -->
  <div class="bottom-menu">
    <div class="fbm-l">営業時間：9:00〜17:00<br>定休日：土曜日・日曜日・祝日</div>
    <div class="fbm-r"><a href="contact.html">お問い合わせ</a></div>
  </div>
</body>
</html>
